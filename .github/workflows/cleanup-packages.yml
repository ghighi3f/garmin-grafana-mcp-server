name: Cleanup GHCR Packages

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Run container retention policy
        uses: snok/container-retention-policy@v2.0.0
        with:
          account-type: PERSONAL
          token: ${{ secrets.GITHUB_TOKEN }}
          cut-off: 30d
          untagged-only: true
          keep-at-least: 0
          timestamp-to-use: 'updated_at'
